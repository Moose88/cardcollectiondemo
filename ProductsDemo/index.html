<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Card Collection Demo</title>
    <style>
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 300px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: black;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div>
        <h2>All Cards</h2>
        <br>
        <button onclick="openAddModal()">Add</button>
        <button onclick="openRemoveModal()">Remove</button>
        <ul id="cards"></ul>
        <p id="collectionTotal" style="font-weight: bold; margin-top: 10px;">Total Collection Value: $0.00</p>
    </div>
    <div>
        <h2>Search by ID</h2>
        <input type="text" id="cardId" size="5" />
        <input type="button" value="Search" onclick="find();" />
        <p id="card" />
    </div>

    <!-- Add Card Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddModal()">&times;</span>
            <h3>Add New Card</h3>
            <form id="addCardForm">
                <div class="form-group">
                    <label for="cardName">Name:</label>
                    <input type="text" id="cardName" required />
                </div>
                <div class="form-group">
                    <label for="cardEdition">Edition:</label>
                    <input type="text" id="cardEdition" required />
                </div>
                <div class="form-group">
                    <label for="cardQuality">Quality:</label>
                    <select id="cardQuality" required>
                        <option value="">Select quality...</option>
                        <option value="Near Mint">Near Mint (NM)</option>
                        <option value="Lightly Played">Lightly Played (LP)</option>
                        <option value="Moderately Played">Moderately Played (MP)</option>
                        <option value="Heavily Played">Heavily Played (HP)</option>
                        <option value="Damaged">Damaged (D)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cardPrice">Price:</label>
                    <input type="number" id="cardPrice" step="0.01" required />
                </div>
                <button type="button" onclick="addCard()">Submit</button>
                <button type="button" onclick="closeAddModal()">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Remove Card Modal -->
    <div id="removeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRemoveModal()">&times;</span>
            <h3>Remove Card</h3>
            <form id="removeCardForm">
                <div class="form-group">
                    <label for="removeCardName">Name:</label>
                    <input type="text" id="removeCardName" required />
                </div>
                <div class="form-group">
                    <label for="removeCardEdition">Edition:</label>
                    <input type="text" id="removeCardEdition" required />
                </div>
                <div class="form-group">
                    <label for="removeCardQuality">Quality:</label>
                    <select id="removeCardQuality" required>
                        <option value="">Select quality...</option>
                        <option value="Near Mint">Near Mint (NM)</option>
                        <option value="Lightly Played">Lightly Played (LP)</option>
                        <option value="Moderately Played">Moderately Played (MP)</option>
                        <option value="Heavily Played">Heavily Played (HP)</option>
                        <option value="Damaged">Damaged (D)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="removeCardQuantity">Quantity to Remove:</label>
                    <input type="number" id="removeCardQuantity" min="1" value="1" required />
                </div>
                <button type="button" onclick="removeCard()">Remove</button>
                <button type="button" onclick="closeRemoveModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-2.0.3.min.js"></script>
    <script>
        var uri = 'api/cards';

        $(document).ready(function () {
            loadCards();
            collectionValue();
        });

        function loadCards() {
            $('#cards').empty();
            $.getJSON(uri)
                .done(function (data) {
                    $.each(data, function (key, item) {
                        $('<li>', { text: formatItem(item) }).appendTo($('#cards'));
                    });
                });
        }

        function formatItem(item) {
            return item.Quantity + 'x ' + item.Name + ' ' + item.Edition + ' Edition ' + ' $' + item.Price.toFixed(2);
        }

        function collectionValue() {            
            $.getJSON('api/cards/totalvalue')
                .done(function (data) {
                    var displayText = 'Total Collection Value: $' + data.totalValue.toFixed(2);
                    $('#collectionTotal').text(displayText);
                });
        }

        function find() {
            var id = $('#cardId').val();
            $.getJSON(uri + '/' + id)
                .done(function (data) {
                    $('#cards').text(formatItem(data));
                })
                .fail(function (jqXHR, textStatus, err) {
                    $('#cards').text('Error: ' + err);
                });
        }

        function openAddModal() {
            document.getElementById('addModal').style.display = 'block';
        }

        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('addCardForm').reset();
        }

        function addCard() {
            var card = {
                Name: $('#cardName').val(),
                Edition: $('#cardEdition').val(),
                Quality: $('#cardQuality').val(),
                Price: parseFloat($('#cardPrice').val())
            };

            $.ajax({
                type: 'POST',
                url: uri,
                data: JSON.stringify(card),
                contentType: 'application/json',
                success: function (data) {
                    closeAddModal();
                    loadCards();
                    collectionValue();
                },
                error: function (jqXHR, textStatus, err) {
                    alert('Error: ' + err);
                }
            });
        }

        function openRemoveModal() {
            document.getElementById('removeModal').style.display = 'block';
        }

        function closeRemoveModal() {
            document.getElementById('removeModal').style.display = 'none';
            document.getElementById('removeCardForm').reset();
        }

        function removeCard() {
            var card = {
                Name: $('#removeCardName').val(),
                Edition: $('#removeCardEdition').val(),
                Quality: $('#removeCardQuality').val(),
                Quantity: $('#removeCardQuantity').val()
            }

            $.ajax({
                type: 'DELETE',
                url: 'api/cards/remove',
                data: JSON.stringify(card),
                contentType: 'application/json',
                success: function (response) {
                    alert(response.message);
                    closeRemoveModal();
                    loadCards();
                    collectionValue();
                },
                error: function (jqXHR, textStatus, err) {
                    var errorMsg = 'Error: ';
                    if (jqXHR.responseJSON && jqXHR.responseJSON.message) {
                        errorMsg += jqXHR.responseJSON.message;
                    } else if (jqXHR.responseJSON && jqXHR.responseJSON.Message) {
                        errorMsg += jqXHR.responseJSON.Message;
                    } else {
                        errorMsg += err;
                    }
                    alert(errorMsg);
                }
            })
        }
    </script>
</body>
</html>
